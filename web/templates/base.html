<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NBATracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/?season={{ season }}&team={{ team }}">NBATracker <span>{{ team_name }} Analytics</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/?season={{ season }}&team={{ team }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'players' %}active{% endif %}" href="/players?season={{ season }}&team={{ team }}">Players</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'advanced' %}active{% endif %}" href="/advanced?season={{ season }}&team={{ team }}">Advanced</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'predictions' %}active{% endif %}" href="/predictions?season={{ season }}&team={{ team }}">Predictions</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'trades' %}active{% endif %}" href="/trades?season={{ season }}&team={{ team }}">Trades</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'gaps' %}active{% endif %}" href="/gaps?season={{ season }}&team={{ team }}">Gap Analysis</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <label class="text-muted me-2" style="font-size:0.85rem">Team</label>
          <select id="teamSelect" class="season-select me-3" onchange="changeTeam(this.value)">
            {% for abbr, info in team_options.items() %}
            <option value="{{ abbr }}" {% if team == abbr %}selected{% endif %}>{{ abbr }} — {{ info.city }} {{ info.name }}</option>
            {% endfor %}
          </select>
          <label class="text-muted me-2" style="font-size:0.85rem">Season</label>
          <select id="seasonSelect" class="season-select" onchange="changeSeason(this.value)">
            <option value="2025-26" {% if season == '2025-26' %}selected{% endif %}>2025-26</option>
            <option value="2024-25" {% if season == '2024-25' %}selected{% endif %}>2024-25</option>
          </select>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <div class="footer">
    NBATracker &mdash; Data from nba_api &bull; Charts by Plotly.js
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const PLOTLY_DARK = {
      paper_bgcolor: '#1c2128',
      plot_bgcolor: '#1c2128',
      font: { color: '#e6edf3', family: '-apple-system, BlinkMacSystemFont, sans-serif' },
      xaxis: { gridcolor: '#30363d', zerolinecolor: '#30363d' },
      yaxis: { gridcolor: '#30363d', zerolinecolor: '#30363d' },
      margin: { t: 30, r: 20, b: 40, l: 50 },
    };
    const PLOTLY_CONFIG = { displayModeBar: false, responsive: true };

    const COLORS = {
      gold: '#ffc72c',
      blue: '#1d428a',
      accent: '#58a6ff',
      positive: '#3fb950',
      negative: '#f85149',
      warning: '#d29922',
      muted: '#8b949e',
      series: ['#ffc72c', '#58a6ff', '#3fb950', '#f85149', '#d29922', '#a371f7', '#79c0ff', '#f778ba']
    };

    function applyFilters(season, team) {
      const url = new URL(window.location);
      url.searchParams.set('season', season || url.searchParams.get('season') || '{{ season }}');
      url.searchParams.set('team', team || url.searchParams.get('team') || '{{ team }}');
      window.location = url.toString();
    }

    function changeSeason(season) { applyFilters(season, null); }
    function changeTeam(team) { applyFilters(null, team); }

    function sortTable(table, col, type) {
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const th = table.querySelectorAll('thead th')[col];
      const asc = !th.classList.contains('sorted-asc');
      table.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
      th.classList.add(asc ? 'sorted-asc' : 'sorted-desc');
      rows.sort((a, b) => {
        let va = a.cells[col].textContent.trim();
        let vb = b.cells[col].textContent.trim();
        if (type === 'num') {
          va = parseFloat(va.replace('%','').replace('+','')) || 0;
          vb = parseFloat(vb.replace('%','').replace('+','')) || 0;
        }
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }

    function initSortable(tableId) {
      const table = document.getElementById(tableId);
      if (!table) return;
      table.querySelectorAll('thead th').forEach((th, i) => {
        th.addEventListener('click', () => {
          const type = th.dataset.sort || 'str';
          sortTable(table, i, type);
        });
      });
    }

    async function apiFetch(url) {
      const resp = await fetch(url);
      if (!resp.ok) {
        let msg = `API error (${resp.status})`;
        try { const j = await resp.json(); msg = j.error || msg; } catch(e) {}
        throw new Error(msg);
      }
      return resp.json();
    }

    function showError(msg) {
      const ld = document.getElementById('loading');
      if (ld) {
        ld.className = '';
        ld.style.textAlign = 'center';
        ld.style.padding = '3rem';
        ld.innerHTML = `<div style="color:var(--negative);margin-bottom:0.5rem;font-weight:600">⚠ Data Fetch Error</div>
          <div style="color:var(--text-secondary);font-size:0.85rem;max-width:600px;margin:0 auto">${msg}<br><br>
          <button onclick="location.reload()" style="background:var(--accent);color:white;border:none;padding:0.4rem 1.2rem;border-radius:6px;cursor:pointer;font-size:0.85rem">Retry</button></div>`;
      }
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
